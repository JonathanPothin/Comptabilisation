<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Comptabilisation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

  <link rel="stylesheet" href="style.css?v=5" />
  <link rel="manifest" href="manifest.json" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=5"></script>
  <script src="app.js?v=5" defer></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar fade-in">
      <div>
        <h1>Comptabilisation</h1>
        <p>Course sportive – Tassin</p>
      </div>
      <div class="live-badge">
        <span class="live-dot"></span>
        LIVE
      </div>
    </header>

    <section class="hero-stats fade-in">
      <div class="stat-card big">
        <span class="stat-label">Bureaux complets</span>
        <span id="stat-bureaux" class="stat-value">0 / 15</span>
      </div>
      <div class="stat-card big">
        <span class="stat-label">100 premiers</span>
        <span id="stat-top100" class="stat-value">0</span>
      </div>
      <div class="stat-card big">
        <span class="stat-label">Total journée</span>
        <span id="stat-journee" class="stat-value">0</span>
      </div>
    </section>

    <section class="card glass fade-in">
      <div class="section-title-row">
        <h2>Saisie</h2>
        <button class="icon-btn" type="button" onclick="chargerDonnees(true)">Actualiser</button>
      </div>

      <label for="bureau">Bureau</label>
      <select id="bureau">
        <option value="Bureau 1 Hôtel de ville">Bureau 1 Hôtel de ville</option>
        <option value="Bureau 2 Gymnase des croisettes">Bureau 2 Gymnase des croisettes</option>
        <option value="Bureau 3 Ecole Leclerc">Bureau 3 Ecole Leclerc</option>
        <option value="Bureau 4 Ecole Marin">Bureau 4 Ecole Marin</option>
        <option value="Bureau 5 Ecole Marin">Bureau 5 Ecole Marin</option>
        <option value="Bureau 6 Ecole Baraillon">Bureau 6 Ecole Baraillon</option>
        <option value="Bureau 7 Ecole Baraillon">Bureau 7 Ecole Baraillon</option>
        <option value="Bureau 8 Ecole Leclerc">Bureau 8 Ecole Leclerc</option>
        <option value="Bureau 9 Ecole Berlier Vincent">Bureau 9 Ecole Berlier Vincent</option>
        <option value="Bureau 10 Ecole Berlier Vincent">Bureau 10 Ecole Berlier Vincent</option>
        <option value="Bureau 11 L’Oméga – Centre de loisirs du CPNG">Bureau 11 L’Oméga – Centre de loisirs du CPNG</option>
        <option value="Bureau 12 L'Oméga Pôle associatif">Bureau 12 L'Oméga Pôle associatif</option>
        <option value="Bureau 13 Gymnase des croisettes">Bureau 13 Gymnase des croisettes</option>
        <option value="Bureau 14 Espace Leclerc Salle Molière">Bureau 14 Espace Leclerc Salle Molière</option>
        <option value="Bureau 15 Espace Leclerc Salle Pagnol">Bureau 15 Espace Leclerc Salle Pagnol</option>
      </select>

      <label>Équipe</label>
      <div class="segmented team-grid">
        <button id="team-1" class="segment-btn" type="button" onclick="setEquipe(1)">Yohann HACHANI</button>
        <button id="team-2" class="segment-btn" type="button" onclick="setEquipe(2)">Pascal CHARMOT</button>
        <button id="team-3" class="segment-btn" type="button" onclick="setEquipe(3)">Julien RANC</button>
      </div>

      <label for="rang">Nombre de personnes</label>
      <input id="rang" type="number" min="1" max="100" placeholder="Ex : 20" />

      <div class="quick-row">
        <button class="quick-btn" type="button" onclick="ajouterValeur(1)">+1</button>
        <button class="quick-btn" type="button" onclick="ajouterValeur(5)">+5</button>
        <button class="quick-btn" type="button" onclick="ajouterValeur(10)">+10</button>
      </div>

      <label for="phase">Phase</label>
      <select id="phase">
        <option value="top100">100 premiers</option>
        <option value="journee">Après les 100</option>
      </select>

      <div id="top100-info" class="info-banner"></div>

      <button class="primary-btn" type="button" onclick="envoyer()">Enregistrer</button>

      <div class="meta-row">
        <span id="last-update" class="muted">Mis à jour à l’instant</span>
      </div>
    </section>

    <section class="card glass fade-in">
      <div class="section-title-row">
        <h2>Vue</h2>
        <select id="filtre-bureau" class="mini-select">
          <option value="TOUS">Tous les bureaux</option>
          <option value="Bureau 1 Hôtel de ville">Bureau 1 Hôtel de ville</option>
        <option value="Bureau 2 Gymnase des croisettes">Bureau 2 Gymnase des croisettes</option>
        <option value="Bureau 3 Ecole Leclerc">Bureau 3 Ecole Leclerc</option>
        <option value="Bureau 4 Ecole Marin">Bureau 4 Ecole Marin</option>
        <option value="Bureau 5 Ecole Marin">Bureau 5 Ecole Marin</option>
        <option value="Bureau 6 Ecole Baraillon">Bureau 6 Ecole Baraillon</option>
        <option value="Bureau 7 Ecole Baraillon">Bureau 7 Ecole Baraillon</option>
        <option value="Bureau 8 Ecole Leclerc">Bureau 8 Ecole Leclerc</option>
        <option value="Bureau 9 Ecole Berlier Vincent">Bureau 9 Ecole Berlier Vincent</option>
        <option value="Bureau 10 Ecole Berlier Vincent">Bureau 10 Ecole Berlier Vincent</option>
        <option value="Bureau 11 L’Oméga – Centre de loisirs du CPNG">Bureau 11 L’Oméga – Centre de loisirs du CPNG</option>
        <option value="Bureau 12 L'Oméga Pôle associatif">Bureau 12 L'Oméga Pôle associatif</option>
        <option value="Bureau 13 Gymnase des croisettes">Bureau 13 Gymnase des croisettes</option>
        <option value="Bureau 14 Espace Leclerc Salle Molière">Bureau 14 Espace Leclerc Salle Molière</option>
        <option value="Bureau 15 Espace Leclerc Salle Pagnol">Bureau 15 Espace Leclerc Salle Pagnol</option>
        </select>
      </div>

      <div class="segmented view-segment">
        <button id="view-top100" class="segment-btn active" type="button" onclick="setViewMode('top100')">100 premiers</button>
        <button id="view-apres100" class="segment-btn" type="button" onclick="setViewMode('apres100')">Après les 100</button>
        <button id="view-journee" class="segment-btn" type="button" onclick="setViewMode('journee')">Total journée</button>
      </div>
    </section>

    <section class="grid-main fade-in">
      <section class="card glass">
        <h2>Classement actuel</h2>
        <div id="classement-principal" class="ranking-list"></div>
      </section>

      <section class="card glass">
        <h2>Scores</h2>
        <div id="score-cards" class="score-stack"></div>
      </section>
    </section>

    <section class="card glass fade-in">
      <h2>Infographie</h2>
      <div id="main-bars" class="bar-group"></div>
    </section>

    <section class="card glass fade-in">
      <h2>Par bureau</h2>
      <div id="table-main"></div>
    </section>

    <details class="card glass fade-in">
      <summary>Options organisateur</summary>

      <div class="options-grid">
        <button class="secondary-btn danger" type="button" onclick="annulerDerniereSaisie()">Annuler la dernière saisie</button>
        <button class="secondary-btn" type="button" onclick="exporterCSV()">Exporter CSV</button>
        <button class="secondary-btn" type="button" onclick="copierResume()">Copier le résumé</button>
      </div>

      <div class="history-block">
        <h3>Dernières saisies</h3>
        <div id="historique"></div>
      </div>
    </details>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
