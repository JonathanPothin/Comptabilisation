<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Comptabilisation Course Tassin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="stylesheet" href="style.css?v=3">
  <link rel="manifest" href="manifest.json">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js?v=3"></script>
  <script src="app.js?v=3" defer></script>
</head>
<body>
  <div class="app">
    <header class="hero">
      <h1>Comptabilisation</h1>
      <p>Course sportive – bureaux de vote</p>
    </header>

    <section class="panel">
      <h2>Saisie</h2>

      <label for="bureau">Bureau</label>
      <select id="bureau">
        <option value="Bureau 1">Bureau 1</option>
        <option value="Bureau 2">Bureau 2</option>
        <option value="Bureau 3">Bureau 3</option>
        <option value="Bureau 4">Bureau 4</option>
        <option value="Bureau 5">Bureau 5</option>
        <option value="Bureau 6">Bureau 6</option>
        <option value="Bureau 7">Bureau 7</option>
        <option value="Bureau 8">Bureau 8</option>
        <option value="Bureau 9">Bureau 9</option>
        <option value="Bureau 10">Bureau 10</option>
        <option value="Bureau 11">Bureau 11</option>
        <option value="Bureau 12">Bureau 12</option>
        <option value="Bureau 13">Bureau 13</option>
        <option value="Bureau 14">Bureau 14</option>
        <option value="Bureau 15">Bureau 15</option>
      </select>

      <label>Équipe</label>
      <div class="team-grid">
        <button id="team-1" class="team-btn" type="button" onclick="setEquipe(1)">Équipe 1</button>
        <button id="team-2" class="team-btn" type="button" onclick="setEquipe(2)">Équipe 2</button>
        <button id="team-3" class="team-btn" type="button" onclick="setEquipe(3)">Équipe 3</button>
      </div>

      <label for="rang">Rang / nombre</label>
      <input id="rang" type="number" min="1" placeholder="Ex : 20">

      <label for="phase">Phase</label>
      <select id="phase">
        <option value="top100">100 premiers</option>
        <option value="journee">Toute la journée</option>
      </select>

      <button class="save-btn" type="button" onclick="envoyer()">Enregistrer</button>
      <button class="refresh-btn" type="button" onclick="chargerDonnees()">Actualiser les résultats</button>

      <p id="message" class="message"></p>
    </section>

    <section class="grid-stats">
      <div class="panel stat-card">
        <h2>100 premiers</h2>
        <div id="top100-cards" class="score-cards"></div>
      </div>

      <div class="panel stat-card">
        <h2>Toute la journée</h2>
        <div id="journee-cards" class="score-cards"></div>
      </div>
    </section>

    <section class="panel">
      <h2>Infographie 100 premiers</h2>
      <div id="top100-bars"></div>
    </section>

    <section class="panel">
      <h2>Infographie journée</h2>
      <div id="journee-bars"></div>
    </section>

    <section class="panel">
      <h2>Par bureau – 100 premiers</h2>
      <div id="table-top100"></div>
    </section>

    <section class="panel">
      <h2>Par bureau – journée</h2>
      <div id="table-journee"></div>
    </section>
  </div>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js");
    }
  </script>
</body>
</html>
