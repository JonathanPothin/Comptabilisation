<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Résultats 100 premiers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
</head>
<body>
  <div class="container">
    <h1>Résultats 100 premiers</h1>
    <div class="card">
      <div id="resultats">Chargement...</div>
    </div>
  </div>

  <script>
    async function load() {
      const { data, error } = await supabase
        .from("passages")
        .select("*")
        .eq("phase", "top100")
        .order("bureau", { ascending: true });

      if (error) {
        document.getElementById("resultats").innerHTML = "Erreur de chargement";
        return;
      }

      const score = { 1: 0, 2: 0, 3: 0 };

      data.forEach(p => {
        score[p.equipe]++;
      });

      let html = `
        <p><strong>Équipe 1 :</strong> ${score[1]}</p>
        <p><strong>Équipe 2 :</strong> ${score[2]}</p>
        <p><strong>Équipe 3 :</strong> ${score[3]}</p>
        <hr>
      `;

      data.forEach(p => {
        html += `<p>${p.bureau} — Équipe ${p.equipe} — Rang ${p.rang}</p>`;
      });

      document.getElementById("resultats").innerHTML = html;
    }

    load();
  </script>
</body>
</html>
